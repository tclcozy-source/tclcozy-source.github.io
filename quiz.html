<!DOCTYPE html>
<html>
<head>
  <title>Science Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      padding: 40px 20px 60px;
    }
    .back-btn {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
      margin-bottom: 36px;
    }
    .back-btn:hover {
      background: rgba(255,77,158,0.15);
      border-color: rgba(168,85,247,0.6);
      color: white;
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255,77,158,0.35), 0 0 36px rgba(168,85,247,0.15);
    }
    h1 {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(90deg, #ff4d9e, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.4); margin-bottom: 36px; }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 560px;
      margin: 0 auto;
    }
    #progress { font-size: 14px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
    #question { font-size: 20px; color: rgba(255,255,255,0.9); line-height: 1.5; margin-bottom: 28px; min-height: 56px; }
    .options { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .option {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      padding: 14px 24px;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      max-width: 420px;
      transition: border 0.2s, transform 0.15s, background 0.2s;
      text-align: left;
    }
    .option:hover { border-color: rgba(255,77,158,0.5); transform: scale(1.02); background: rgba(255,255,255,0.09); }
    .option.selected { border-color: #a855f7; background: rgba(168,85,247,0.15); color: white; }
    .action-btn {
      background: linear-gradient(135deg, #ff4d9e, #a855f7);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 11px 28px;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .action-btn:hover { opacity: 0.85; transform: scale(1.04); }
    #final-score { font-size: 42px; color: gold; margin: 16px 0 24px; }
    .review-item {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 18px 20px;
      margin: 12px auto;
      max-width: 460px;
      text-align: left;
      font-size: 15px;
    }
    .review-item.correct { border-left: 4px solid #4ade80; }
    .review-item.wrong { border-left: 4px solid #f87171; }
    .review-item p { margin-top: 6px; color: rgba(255,255,255,0.55); font-size: 14px; }
    .review-item .correct-ans { color: #4ade80; }

    @media (max-width: 480px) {
      .content { padding: 28px 16px 48px; }
      h1 { font-size: 34px; }
      .subtitle { font-size: 14px; margin-bottom: 24px; }
      .glass { padding: 24px 16px 32px; }
      #question { font-size: 17px; min-height: unset; margin-bottom: 20px; }
      .option { max-width: 100%; font-size: 15px; padding: 13px 16px; }
      .action-btn { font-size: 15px; padding: 12px 28px; }
      #final-score { font-size: 32px; }
      .review-item { padding: 14px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="content">
    <div id="quiz-screen">
      <a class="back-btn" href="index.html">⬅️ Home</a>
      <h1>🔬 Science Quiz</h1>
      <p class="subtitle">8 questions — how many can you get right?</p>
      <div class="glass">
        <p id="progress">Question 1 of 8</p>
        <p id="question"></p>
        <div class="options" id="options"></div>
        <button class="action-btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Next ➡️</button>
      </div>
    </div>

    <div id="result-screen" style="display:none">
      <a class="back-btn" href="index.html">⬅️ Home</a>
      <h1>🔬 Quiz Results</h1>
      <p class="subtitle">Here's how you did</p>
      <div class="glass">
        <p id="final-score"></p>
        <div id="review"></div>
        <button class="action-btn" onclick="restartQuiz()">🔄 Play Again</button>
      </div>
    </div>
  </div>

  <script>
    var canvas = document.getElementById("stars");
    var ctx = canvas.getContext("2d");
    var stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    for (var i = 0; i < 160; i++) {
      stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.3, speed: Math.random() * 0.012 + 0.003, phase: Math.random() * Math.PI * 2 });
    }
    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    requestAnimationFrame(drawStars);

    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }

    var ALL_QUESTIONS = [
      { q: "What is the closest planet to the Sun?", options: ["Venus", "Earth", "Mercury", "Mars"], answer: "Mercury" },
      { q: "What gas do plants absorb from the atmosphere?", options: ["Oxygen", "Carbon Dioxide", "Nitrogen", "Hydrogen"], answer: "Carbon Dioxide" },
      { q: "How many bones are in the adult human body?", options: ["206", "185", "230", "196"], answer: "206" },
      { q: "What is the chemical symbol for water?", options: ["WA", "H2O", "HO2", "OW"], answer: "H2O" },
      { q: "What planet is known as the Red Planet?", options: ["Jupiter", "Saturn", "Venus", "Mars"], answer: "Mars" },
      { q: "What is the powerhouse of the cell?", options: ["Nucleus", "Ribosome", "Mitochondria", "Chloroplast"], answer: "Mitochondria" },
      { q: "What force keeps us on the ground?", options: ["Magnetism", "Friction", "Gravity", "Tension"], answer: "Gravity" },
      { q: "What is the speed of light?", options: ["300,000 km/s", "150,000 km/s", "500,000 km/s", "100,000 km/s"], answer: "300,000 km/s" },
      { q: "What is the largest organ in the human body?", options: ["Liver", "Brain", "Skin", "Lungs"], answer: "Skin" },
      { q: "How many planets are in our Solar System?", options: ["7", "8", "9", "10"], answer: "8" },
      { q: "What is the atomic number of carbon?", options: ["6", "8", "12", "14"], answer: "6" },
      { q: "What gas makes up most of Earth's atmosphere?", options: ["Oxygen", "Carbon Dioxide", "Argon", "Nitrogen"], answer: "Nitrogen" },
      { q: "What is the hardest natural substance on Earth?", options: ["Gold", "Diamond", "Iron", "Quartz"], answer: "Diamond" },
      { q: "Which blood type is the universal donor?", options: ["A+", "O-", "AB+", "B-"], answer: "O-" },
      { q: "What part of the plant conducts photosynthesis?", options: ["Root", "Stem", "Leaf", "Flower"], answer: "Leaf" },
      { q: "How many chromosomes do humans normally have?", options: ["23", "44", "46", "48"], answer: "46" },
      { q: "What is the chemical formula for table salt?", options: ["NaCl", "KCl", "CaCO3", "MgO"], answer: "NaCl" },
      { q: "Which planet has the most moons?", options: ["Jupiter", "Saturn", "Uranus", "Neptune"], answer: "Saturn" },
      { q: "What type of wave is sound?", options: ["Transverse", "Electromagnetic", "Longitudinal", "Surface"], answer: "Longitudinal" },
      { q: "What element is a diamond made of?", options: ["Silicon", "Carbon", "Nitrogen", "Boron"], answer: "Carbon" },
      { q: "What is the most abundant element in the universe?", options: ["Helium", "Oxygen", "Hydrogen", "Carbon"], answer: "Hydrogen" },
      { q: "Which organ produces insulin?", options: ["Liver", "Kidney", "Pancreas", "Spleen"], answer: "Pancreas" },
      { q: "What is the boiling point of water at sea level?", options: ["90°C", "95°C", "100°C", "105°C"], answer: "100°C" },
      { q: "How long does light from the Sun take to reach Earth?", options: ["1 minute", "8 minutes", "20 minutes", "1 hour"], answer: "8 minutes" },
      { q: "What is the smallest unit of matter?", options: ["Cell", "Molecule", "Atom", "Electron"], answer: "Atom" },
      { q: "Which gas do humans exhale?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], answer: "Carbon Dioxide" },
      { q: "What is the center of an atom called?", options: ["Electron", "Proton", "Nucleus", "Neutron"], answer: "Nucleus" },
      { q: "What planet is closest in size to Earth?", options: ["Mars", "Venus", "Mercury", "Neptune"], answer: "Venus" },
      { q: "How many chambers does the human heart have?", options: ["2", "3", "4", "6"], answer: "4" },
      { q: "What is the chemical symbol for gold?", options: ["Go", "Gd", "Au", "Ag"], answer: "Au" },
      { q: "Which vitamin is produced when skin is exposed to sunlight?", options: ["Vitamin A", "Vitamin C", "Vitamin D", "Vitamin K"], answer: "Vitamin D" },
      { q: "What is the largest planet in our Solar System?", options: ["Saturn", "Neptune", "Jupiter", "Uranus"], answer: "Jupiter" },
      { q: "What type of energy does the Sun produce?", options: ["Chemical energy", "Nuclear energy", "Electrical energy", "Mechanical energy"], answer: "Nuclear energy" },
      { q: "What is the name of the process by which water turns into vapor?", options: ["Condensation", "Evaporation", "Sublimation", "Precipitation"], answer: "Evaporation" },
      { q: "How many sides does a hexagon have?", options: ["5", "6", "7", "8"], answer: "6" },
      { q: "What force opposes motion between surfaces?", options: ["Gravity", "Tension", "Friction", "Magnetism"], answer: "Friction" },
      { q: "Which part of the cell contains DNA?", options: ["Mitochondria", "Ribosome", "Nucleus", "Cell wall"], answer: "Nucleus" },
      { q: "What is the chemical symbol for iron?", options: ["Ir", "Ie", "In", "Fe"], answer: "Fe" },
      { q: "What is the name of the layer of Earth we live on?", options: ["Mantle", "Core", "Crust", "Lithosphere"], answer: "Crust" },
      { q: "What do bees collect to make honey?", options: ["Pollen", "Nectar", "Sap", "Dew"], answer: "Nectar" },
      { q: "What is the unit of electric current?", options: ["Volt", "Watt", "Ampere", "Ohm"], answer: "Ampere" },
      { q: "Which planet has rings visible from Earth?", options: ["Jupiter", "Uranus", "Saturn", "Neptune"], answer: "Saturn" },
      { q: "What is the freezing point of water?", options: ["-10°C", "0°C", "10°C", "32°C"], answer: "0°C" },
      { q: "What type of animal is a whale?", options: ["Fish", "Reptile", "Amphibian", "Mammal"], answer: "Mammal" },
      { q: "How many legs does a spider have?", options: ["6", "8", "10", "12"], answer: "8" },
      { q: "What is the main source of energy for Earth?", options: ["The Moon", "The Sun", "The Core", "Wind"], answer: "The Sun" },
      { q: "What organ pumps blood through the body?", options: ["Lungs", "Liver", "Heart", "Kidney"], answer: "Heart" }
    ];

    var questions = [];
    var current = 0, userAnswers = [], selectedAnswer = null;

    function pickQuestions() {
      questions = shuffle(ALL_QUESTIONS.slice()).slice(0, 8);
    }

    function loadQuestion() {
      selectedAnswer = null;
      var q = questions[current];
      document.getElementById("question").innerHTML = q.q;
      document.getElementById("progress").innerHTML = "Question " + (current + 1) + " of " + questions.length;
      document.getElementById("nextBtn").style.display = "none";
      var optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";
      shuffle(q.options.slice()).forEach(function(opt) {
        var btn = document.createElement("button");
        btn.className = "option";
        btn.innerHTML = opt;
        btn.onclick = function() {
          document.querySelectorAll(".option").forEach(function(b) { b.classList.remove("selected"); });
          btn.classList.add("selected");
          selectedAnswer = opt;
          document.getElementById("nextBtn").style.display = "inline-block";
        };
        optionsDiv.appendChild(btn);
      });
    }

    function nextQuestion() {
      if (!selectedAnswer) return;
      userAnswers.push(selectedAnswer);
      current++;
      if (current < questions.length) { loadQuestion(); } else { showResults(); }
    }

    function showResults() {
      document.getElementById("quiz-screen").style.display = "none";
      document.getElementById("result-screen").style.display = "block";
      var score = 0, reviewHTML = "";
      questions.forEach(function(q, i) {
        var correct = userAnswers[i] === q.answer;
        if (correct) score++;
        reviewHTML += "<div class='review-item " + (correct ? "correct" : "wrong") + "'>";
        reviewHTML += "<strong>" + (correct ? "✅" : "❌") + " Q" + (i+1) + ": " + q.q + "</strong>";
        reviewHTML += "<p>Your answer: " + userAnswers[i] + "</p>";
        if (!correct) reviewHTML += "<p class='correct-ans'>Correct: " + q.answer + "</p>";
        reviewHTML += "</div>";
      });
      var msg = score === 8 ? "🏆 Perfect!" : score >= 6 ? "🎉 Great job!" : score >= 4 ? "👍 Not bad!" : "😅 Keep studying!";
      document.getElementById("final-score").innerHTML = msg + "<br>" + score + " / 8";
      document.getElementById("review").innerHTML = reviewHTML;
    }

    function restartQuiz() {
      current = 0; userAnswers = []; selectedAnswer = null;
      document.getElementById("quiz-screen").style.display = "block";
      document.getElementById("result-screen").style.display = "none";
      pickQuestions();
      loadQuestion();
    }

    pickQuestions();
    loadQuestion();
  </script>
</body>
</html>
