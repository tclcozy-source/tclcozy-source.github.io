<!DOCTYPE html>
<html>
<head>
  <title>Reaction Time – Shahmeer's Game Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 700px;
      padding: 24px 20px 40px;
      gap: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 20px;
    }

    .back-btn {
      text-decoration: none;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 14px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
    }
    .back-btn:hover {
      background: rgba(255,77,158,0.15);
      border-color: rgba(168,85,247,0.6);
      color: white;
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255,77,158,0.35), 0 0 36px rgba(168,85,247,0.15);
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(90deg, #ff4d9e, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    /* Lights panel */
    .lights-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 36px 40px 32px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      margin-bottom: 24px;
    }

    .lights-row {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }

    .light-housing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .light {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1a0a0a;
      border: 3px solid #2a1010;
      transition: background 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      position: relative;
    }

    .light.on {
      background: radial-gradient(circle at 38% 35%, #ff6060, #cc0000 55%, #800000);
      border-color: #ff2020;
      box-shadow:
        0 0 18px rgba(255,0,0,0.9),
        0 0 40px rgba(255,0,0,0.55),
        0 0 80px rgba(255,0,0,0.25),
        inset 0 0 16px rgba(255,120,120,0.3);
    }

    .light.on::after {
      content: '';
      position: absolute;
      top: 14%;
      left: 20%;
      width: 32%;
      height: 20%;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      filter: blur(2px);
    }

    /* Status area */
    .status-area {
      text-align: center;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-label {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-main {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
      transition: color 0.3s;
    }

    .status-main.result-green { color: #4ade80; }
    .status-main.result-yellow { color: #facc15; }
    .status-main.result-red { color: #f87171; }
    .status-main.result-neutral { color: white; }
    .status-main.result-penalty { color: #f87171; }

    .status-sub {
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
    }

    .status-sub.quality-green { color: #4ade80; }
    .status-sub.quality-yellow { color: #facc15; }
    .status-sub.quality-red { color: #f87171; }

    /* Best times row */
    .bests {
      display: flex;
      gap: 16px;
      width: 100%;
      margin-bottom: 28px;
    }

    .best-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 12px 16px;
      text-align: center;
    }

    .best-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .best-value {
      font-size: 22px;
      font-weight: 800;
      color: #facc15;
    }
    .best-value.unset { color: rgba(255,255,255,0.2); font-size: 18px; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      background: linear-gradient(135deg, #ff4d9e, #a855f7);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 800;
      padding: 14px 40px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:hover { transform: scale(1.05); opacity: 0.9; }

    /* Instruction bar */
    .instruction {
      font-size: 15px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      margin-top: 16px;
      min-height: 22px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .lights-panel { padding: 28px 16px 24px; gap: 24px; }
      .light { width: 52px; height: 52px; }
      .lights-row { gap: 12px; }
      .status-main { font-size: 40px; }
      h1 { font-size: 18px; }
      .bests { gap: 10px; }
      .btn { padding: 12px 28px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <button id="mute-btn" onclick="toggleMute()" title="Sound" style="position:fixed;top:14px;right:14px;z-index:9999;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;backdrop-filter:blur(10px);transition:transform .15s"></button>

  <div class="page">
    <div class="top-bar">
      <a class="back-btn" href="index.html">← Back</a>
      <h1>🏎️ Reaction Time</h1>
      <div style="width:70px"></div>
    </div>

    <div class="lights-panel">
      <div class="lights-row">
        <div class="light-housing"><div class="light" id="l0"></div></div>
        <div class="light-housing"><div class="light" id="l1"></div></div>
        <div class="light-housing"><div class="light" id="l2"></div></div>
        <div class="light-housing"><div class="light" id="l3"></div></div>
        <div class="light-housing"><div class="light" id="l4"></div></div>
      </div>

      <div class="status-area">
        <div class="status-label" id="status-label">REACTION TIME</div>
        <div class="status-main result-neutral" id="status-main">Ready?</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
    </div>

    <div class="bests">
      <div class="best-box">
        <div class="best-label">Session Best</div>
        <div class="best-value unset" id="session-best">—</div>
      </div>
      <div class="best-box">
        <div class="best-label">All-Time Best</div>
        <div class="best-value unset" id="alltime-best">—</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" id="action-btn">Start</button>
    </div>

    <div class="instruction" id="instruction">Press Start or Spacebar to begin</div>
  </div>

  <script>
    // Stars background
    var bgCanvas = document.getElementById('bg-canvas');
    var bgCtx = bgCanvas.getContext('2d');
    var stars = [];
    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
    resizeBg();
    window.addEventListener('resize', resizeBg);
    for (var i = 0; i < 140; i++) {
      stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + 0.2,
        speed: Math.random() * 0.01 + 0.003, phase: Math.random() * Math.PI * 2 });
    }
    function drawBg(t) {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var a = 0.25 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        bgCtx.beginPath();
        bgCtx.arc(s.x * bgCanvas.width, s.y * bgCanvas.height, s.r, 0, Math.PI * 2);
        bgCtx.fillStyle = 'rgba(255,255,255,' + a + ')';
        bgCtx.fill();
      }
      requestAnimationFrame(drawBg);
    }
    requestAnimationFrame(drawBg);

    // Game state
    var STATE = { IDLE: 0, LIGHTING: 1, WAITING: 2, GO: 3, RESULT: 4, PENALTY: 5 };
    var state = STATE.IDLE;
    var lightTimers = [];
    var goTimer = null;
    var goTime = null;
    var sessionBest = null;
    var allTimeBest = parseInt(localStorage.getItem('rt_best') || '0') || null;

    var lights = [
      document.getElementById('l0'), document.getElementById('l1'),
      document.getElementById('l2'), document.getElementById('l3'),
      document.getElementById('l4')
    ];
    var statusMain = document.getElementById('status-main');
    var statusSub = document.getElementById('status-sub');
    var statusLabel = document.getElementById('status-label');
    var actionBtn = document.getElementById('action-btn');
    var instruction = document.getElementById('instruction');
    var sessionBestEl = document.getElementById('session-best');
    var alltimeBestEl = document.getElementById('alltime-best');

    function updateBestDisplay() {
      if (sessionBest !== null) {
        sessionBestEl.textContent = sessionBest + ' ms';
        sessionBestEl.classList.remove('unset');
      }
      if (allTimeBest !== null) {
        alltimeBestEl.textContent = allTimeBest + ' ms';
        alltimeBestEl.classList.remove('unset');
      }
    }
    updateBestDisplay();

    function clearAllTimers() {
      lightTimers.forEach(clearTimeout);
      lightTimers = [];
      clearTimeout(goTimer);
      goTimer = null;
    }

    function resetLights() {
      lights.forEach(function(l) { l.classList.remove('on'); });
    }

    function startSequence() {
      clearAllTimers();
      resetLights();
      state = STATE.LIGHTING;
      actionBtn.textContent = 'Abort';
      instruction.textContent = 'Watch the lights…';
      setStatus('neutral', 'Get Ready', '', 'LIGHTS OUT');

      var delay = 700;
      lights.forEach(function(light, i) {
        var t = setTimeout(function() {
          light.classList.add('on');
          sndLightOn();
          if (i === 4) {
            // All 5 lit — wait random 1-4s then extinguish
            state = STATE.WAITING;
            var wait = 1000 + Math.random() * 3000;
            goTimer = setTimeout(function() {
              resetLights();
              goTime = performance.now();
              state = STATE.GO;
              sndLightsOut();
              instruction.textContent = 'NOW! Press Space or click!';
              setStatus('neutral', 'GO!', '', 'REACTION TIME');
            }, wait);
          }
        }, delay * (i + 1));
        lightTimers.push(t);
      });
    }

    function react() {
      if (state === STATE.LIGHTING || state === STATE.WAITING) {
        // Jump start
        clearAllTimers();
        resetLights();
        sndJumpStart();
        state = STATE.PENALTY;
        setStatus('penalty', 'Jump Start!', 'Too early — wait for lights out', 'PENALTY');
        actionBtn.textContent = 'Try Again';
        instruction.textContent = 'Press Try Again or Spacebar';
        return;
      }

      if (state === STATE.GO) {
        var rt = Math.round(performance.now() - goTime);
        state = STATE.RESULT;

        var colorClass, quality;
        if (rt < 200) {
          colorClass = 'result-green'; quality = 'Excellent! ⚡';
        } else if (rt <= 300) {
          colorClass = 'result-yellow'; quality = 'Good 👍';
        } else {
          colorClass = 'result-red'; quality = 'Keep Practicing 🔁';
        }

        var qualityClass = colorClass.replace('result-', 'quality-');
        sndResult(rt);
        setStatus(colorClass.replace('result-', ''), rt + ' ms', quality, 'REACTION TIME');
        statusSub.className = 'status-sub ' + qualityClass;

        // Update bests
        if (sessionBest === null || rt < sessionBest) sessionBest = rt;
        if (allTimeBest === null || rt < allTimeBest) {
          allTimeBest = rt;
          localStorage.setItem('rt_best', allTimeBest);
        }
        updateBestDisplay();

        actionBtn.textContent = 'Try Again';
        instruction.textContent = 'Press Try Again or Spacebar';
        return;
      }
    }

    function setStatus(colorKey, main, sub, label) {
      statusMain.className = 'status-main result-' + (colorKey || 'neutral');
      statusMain.textContent = main;
      statusSub.textContent = sub;
      statusSub.className = 'status-sub';
      if (label) statusLabel.textContent = label;
    }

    actionBtn.addEventListener('click', function() {
      if (state === STATE.IDLE || state === STATE.RESULT || state === STATE.PENALTY) {
        startSequence();
      } else if (state === STATE.GO || state === STATE.LIGHTING || state === STATE.WAITING) {
        react();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.code !== 'Space' && e.code !== 'Enter') return;
      e.preventDefault();
      if (state === STATE.IDLE || state === STATE.RESULT || state === STATE.PENALTY) {
        startSequence();
      } else if (state === STATE.GO || state === STATE.LIGHTING || state === STATE.WAITING) {
        react();
      }
    });

    // Also allow any click on the page body during GO phase
    document.addEventListener('click', function(e) {
      if (e.target === actionBtn) return;
      if (state === STATE.GO || state === STATE.LIGHTING || state === STATE.WAITING) {
        react();
      }
    });

    // ── Audio ──────────────────────────────────────────────────────
    var _ac=null,_muted=localStorage.getItem('sfx')==='1';
    function _ctx(){return _ac||(_ac=new(window.AudioContext||window.webkitAudioContext)())}
    function _sfx(f){if(!_muted)try{f(_ctx())}catch(e){}}
    function toggleMute(){_muted=!_muted;localStorage.setItem('sfx',_muted?'1':'0');document.getElementById('mute-btn').textContent=_muted?'🔇':'🔊'}
    function sndLightOn(){_sfx(function(c){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(400,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+.06);g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.08);o.start();o.stop(c.currentTime+.08)})}
    function sndLightsOut(){_sfx(function(c){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(150,c.currentTime);o.frequency.linearRampToValueAtTime(80,c.currentTime+.2);g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.start();o.stop(c.currentTime+.25)})}
    function sndResult(ms){_sfx(function(c){var f=ms<200?880:ms<300?660:440;var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.3)})}
    function sndJumpStart(){_sfx(function(c){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);o.frequency.exponentialRampToValueAtTime(100,c.currentTime+.3);g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.35);o.start();o.stop(c.currentTime+.35)})}
    document.getElementById('mute-btn').textContent=_muted?'🔇':'🔊';
  </script>
</body>
</html>
