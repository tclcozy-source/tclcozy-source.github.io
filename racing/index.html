<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Racing Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- First-person cockpit overlay (shown only in cockpit view) -->
  <div id="cockpit-overlay">
    <div id="cockpit-dash"></div>
    <div id="cockpit-wheel">
      <div id="cockpit-wheel-spin">
        <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <!-- spokes -->
          <line x1="120" y1="120" x2="22"  y2="120" stroke="#17181c" stroke-width="26" stroke-linecap="round"/>
          <line x1="120" y1="120" x2="218" y2="120" stroke="#17181c" stroke-width="26" stroke-linecap="round"/>
          <line x1="120" y1="120" x2="120" y2="220" stroke="#17181c" stroke-width="26" stroke-linecap="round"/>
          <!-- rim -->
          <circle cx="120" cy="120" r="104" fill="none" stroke="#0e0f12" stroke-width="28"/>
          <circle cx="120" cy="120" r="104" fill="none" stroke="#2b2d34" stroke-width="9"/>
          <!-- grip pads with stitching (9 & 3 o'clock) -->
          <rect x="6"   y="98" width="26" height="44" rx="11" fill="#202227" stroke="#3a3d45" stroke-width="2"/>
          <rect x="208" y="98" width="26" height="44" rx="11" fill="#202227" stroke="#3a3d45" stroke-width="2"/>
          <line x1="13"  y1="104" x2="13"  y2="136" stroke="#d11414" stroke-width="1.5" stroke-dasharray="3 3"/>
          <line x1="227" y1="104" x2="227" y2="136" stroke="#d11414" stroke-width="1.5" stroke-dasharray="3 3"/>
          <!-- rotary dials on the side spokes -->
          <circle cx="72"  cy="120" r="13" fill="#0d0e11" stroke="#3a3d45" stroke-width="2"/>
          <circle cx="72"  cy="120" r="7"  fill="#1c1e23"/>
          <line   x1="72"  y1="113" x2="72"  y2="120" stroke="#e0c020" stroke-width="2"/>
          <circle cx="168" cy="120" r="13" fill="#0d0e11" stroke="#3a3d45" stroke-width="2"/>
          <circle cx="168" cy="120" r="7"  fill="#1c1e23"/>
          <line   x1="168" y1="113" x2="168" y2="120" stroke="#28b0e0" stroke-width="2"/>
          <!-- hub control panel -->
          <rect x="88" y="90" width="64" height="68" rx="10" fill="#15161a" stroke="#34373f" stroke-width="2"/>
          <!-- shift-light strip -->
          <rect x="94" y="95" width="52" height="9" rx="3" fill="#0a0b0d"/>
          <circle cx="100" cy="99.5" r="2" fill="#23d05a"/>
          <circle cx="108" cy="99.5" r="2" fill="#23d05a"/>
          <circle cx="116" cy="99.5" r="2" fill="#e0c020"/>
          <circle cx="124" cy="99.5" r="2" fill="#e0c020"/>
          <circle cx="132" cy="99.5" r="2" fill="#d11414"/>
          <circle cx="140" cy="99.5" r="2" fill="#d11414"/>
          <!-- coloured button grid -->
          <circle cx="100" cy="120" r="5" fill="#d11414"/>
          <circle cx="120" cy="120" r="5" fill="#e0c020"/>
          <circle cx="140" cy="120" r="5" fill="#28b0e0"/>
          <circle cx="100" cy="140" r="5" fill="#23d05a"/>
          <circle cx="120" cy="140" r="5" fill="#c8ccd4"/>
          <circle cx="140" cy="140" r="5" fill="#d11414"/>
          <!-- top centre marker (GT3 yellow) -->
          <rect x="113" y="16" width="14" height="24" rx="3" fill="#e0c020"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- View mode hint -->
  <div id="view-hint">3rd person · <span class="key-hint">C</span> cockpit</div>

  <!-- Ignition / starter -->
  <div id="ignition-controls">
    <div id="engine-status" class="status-off">Engine Off</div>
    <div id="ignition-buttons">
      <button class="ign-btn" id="btn-ignition">IGN <span class="key-hint">I</span></button>
      <button class="ign-btn start" id="btn-start">START <span class="key-hint">Ctrl+I</span></button>
    </div>
    <button class="ign-btn" id="btn-transmission"><span id="transmission-label">MANUAL</span> <span class="key-hint">T</span></button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="tach">
      <div id="tach-track"><div id="tach-fill"></div></div>
      <div id="tach-readout"><span id="rpm-value">0</span><span id="rpm-unit">rpm</span></div>
    </div>
    <div id="dash">
      <div id="gear-box">
        <span id="gear-value">1</span>
        <span id="gear-label">gear</span>
      </div>
      <div id="speedometer">
        <span id="speed-value">0</span>
        <span id="speed-unit">km/h</span>
      </div>
    </div>
  </div>

  <!-- Desktop-only gate (shown on phones/tablets) -->
  <div id="mobile-gate">
    <div id="mobile-gate-inner">
      <div id="mobile-gate-icon">🖥️</div>
      <p>This game is only available on desktop/laptop.<br>Please open it on a computer.</p>
    </div>
  </div>

  <!-- Scripts -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
