<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Racing Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- First-person cockpit overlay (shown only in cockpit view) -->
  <div id="cockpit-overlay">
    <div id="cockpit-dash"></div>
    <div id="cockpit-wheel">
      <div id="cockpit-wheel-spin">
        <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <!-- spokes -->
          <line x1="120" y1="120" x2="22"  y2="120" stroke="#17181c" stroke-width="24" stroke-linecap="round"/>
          <line x1="120" y1="120" x2="218" y2="120" stroke="#17181c" stroke-width="24" stroke-linecap="round"/>
          <line x1="120" y1="120" x2="120" y2="220" stroke="#17181c" stroke-width="24" stroke-linecap="round"/>
          <!-- rim -->
          <circle cx="120" cy="120" r="104" fill="none" stroke="#0e0f12" stroke-width="26"/>
          <circle cx="120" cy="120" r="104" fill="none" stroke="#2b2d34" stroke-width="10"/>
          <!-- hub -->
          <circle cx="120" cy="120" r="38" fill="#15161a"/>
          <circle cx="120" cy="120" r="32" fill="#23252c"/>
          <!-- top centre marker -->
          <rect x="114" y="18" width="12" height="22" rx="3" fill="#d11414"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- View mode hint -->
  <div id="view-hint">3rd person · <span class="key-hint">C</span> cockpit</div>

  <!-- Ignition / starter -->
  <div id="ignition-controls">
    <div id="engine-status" class="status-off">Engine Off</div>
    <div id="ignition-buttons">
      <button class="ign-btn" id="btn-ignition">IGN <span class="key-hint">I</span></button>
      <button class="ign-btn start" id="btn-start">START <span class="key-hint">Ctrl+I</span></button>
    </div>
    <button class="ign-btn" id="btn-transmission"><span id="transmission-label">MANUAL</span> <span class="key-hint">T</span></button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="tach">
      <div id="tach-track"><div id="tach-fill"></div></div>
      <div id="tach-readout"><span id="rpm-value">0</span><span id="rpm-unit">rpm</span></div>
    </div>
    <div id="dash">
      <div id="gear-box">
        <span id="gear-value">1</span>
        <span id="gear-label">gear</span>
      </div>
      <div id="speedometer">
        <span id="speed-value">0</span>
        <span id="speed-unit">km/h</span>
      </div>
    </div>
  </div>

  <!-- Desktop-only gate (shown on phones/tablets) -->
  <div id="mobile-gate">
    <div id="mobile-gate-inner">
      <div id="mobile-gate-icon">🖥️</div>
      <p>This game is only available on desktop/laptop.<br>Please open it on a computer.</p>
    </div>
  </div>

  <!-- Scripts -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
