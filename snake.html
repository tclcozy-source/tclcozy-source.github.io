<!DOCTYPE html>
<html>
<head>
  <title>Snake – Shahmeer's Game Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px 16px 24px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      margin-bottom: 14px;
    }

    .back-btn {
      text-decoration: none;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 14px;
      border-radius: 999px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: white; border-color: rgba(255,255,255,0.4); }

    h1 {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    .scores {
      display: flex;
      gap: 24px;
      margin-bottom: 14px;
    }

    .score-box {
      text-align: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 8px 22px;
      min-width: 100px;
    }
    .score-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .score-value {
      font-size: 26px;
      font-weight: 700;
      color: #4ade80;
      line-height: 1.2;
    }
    #high-score-val { color: #facc15; }

    #game-canvas {
      border: 2px solid rgba(74,222,128,0.3);
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(74,222,128,0.12), 0 0 60px rgba(74,222,128,0.05);
      display: block;
      background: #050508;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
    }
    #overlay.active { pointer-events: all; }

    .overlay-box {
      background: rgba(10,10,15,0.92);
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .overlay-title {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .overlay-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }

    .overlay-score {
      font-size: 22px;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 20px;
    }

    .btn {
      background: linear-gradient(135deg, #4ade80, #22d3ee);
      border: none;
      color: #0a0a0f;
      font-size: 16px;
      font-weight: 800;
      padding: 12px 36px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      letter-spacing: 0.5px;
    }
    .btn:hover { transform: scale(1.06); opacity: 0.9; }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    .canvas-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      .score-value { font-size: 20px; }
      .overlay-box { padding: 24px 24px; }
      .overlay-title { font-size: 26px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="page">
    <div class="top-bar">
      <a class="back-btn" href="index.html">← Back</a>
      <h1>🐍 Snake</h1>
      <div style="width:70px"></div>
    </div>

    <div class="scores">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-val">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-value" id="high-score-val">0</div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="active">
        <div class="overlay-box" id="start-box">
          <div class="overlay-title">Snake</div>
          <div class="overlay-sub">Arrow keys or WASD to move</div>
          <div class="overlay-sub" style="margin-bottom:20px">Eat 🔴 to grow. Don't hit walls or yourself!</div>
          <button class="btn" id="start-btn">Play</button>
          <div class="hint">Press Space to start</div>
        </div>
        <div class="overlay-box" id="over-box" style="display:none">
          <div class="overlay-title">Game Over</div>
          <div class="overlay-score" id="final-score">Score: 0</div>
          <div class="overlay-sub" id="new-best-msg" style="display:none;color:#facc15;margin-bottom:12px">🏆 New High Score!</div>
          <button class="btn" id="restart-btn">Play Again</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Stars background
    var bgCanvas = document.getElementById('bg-canvas');
    var bgCtx = bgCanvas.getContext('2d');
    var stars = [];
    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
    resizeBg();
    window.addEventListener('resize', resizeBg);
    for (var i = 0; i < 130; i++) {
      stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + 0.2,
        speed: Math.random() * 0.01 + 0.003, phase: Math.random() * Math.PI * 2 });
    }
    function drawBg(t) {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var a = 0.25 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        bgCtx.beginPath();
        bgCtx.arc(s.x * bgCanvas.width, s.y * bgCanvas.height, s.r, 0, Math.PI * 2);
        bgCtx.fillStyle = 'rgba(255,255,255,' + a + ')';
        bgCtx.fill();
      }
      requestAnimationFrame(drawBg);
    }
    requestAnimationFrame(drawBg);

    // Game setup
    var CELL = 20;
    var COLS = 20;
    var ROWS = 20;

    var canvas = document.getElementById('game-canvas');
    var ctx = canvas.getContext('2d');
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;

    // Position overlay over canvas
    var overlay = document.getElementById('overlay');
    function positionOverlay() {
      var rect = canvas.getBoundingClientRect();
      var wrapRect = canvas.parentElement.getBoundingClientRect();
      overlay.style.width = rect.width + 'px';
      overlay.style.height = rect.height + 'px';
    }
    positionOverlay();
    window.addEventListener('resize', positionOverlay);

    var snake, dir, nextDir, food, score, highScore, gameLoop, running, speed;

    highScore = parseInt(localStorage.getItem('snake_hs') || '0');
    document.getElementById('high-score-val').textContent = highScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      speed = 150;
      document.getElementById('score-val').textContent = '0';
      placeFood();
    }

    function placeFood() {
      var empty = [];
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (!snake.some(function(s) { return s.x === c && s.y === r; })) {
            empty.push({ x: c, y: r });
          }
        }
      }
      food = empty[Math.floor(Math.random() * empty.length)];
    }

    function startGame() {
      initGame();
      document.getElementById('start-box').style.display = 'none';
      document.getElementById('over-box').style.display = 'none';
      overlay.classList.remove('active');
      running = true;
      scheduleStep();
    }

    function scheduleStep() {
      if (!running) return;
      gameLoop = setTimeout(step, speed);
    }

    function step() {
      if (!running) return;
      dir = nextDir;
      var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
      // Self collision
      if (snake.some(function(s) { return s.x === head.x && s.y === head.y; })) {
        endGame(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score-val').textContent = score;
        placeFood();
        // Speed up every 50 points, down to 70ms minimum
        speed = Math.max(70, 150 - Math.floor(score / 50) * 10);
      } else {
        snake.pop();
      }

      draw();
      scheduleStep();
    }

    function endGame() {
      running = false;
      clearTimeout(gameLoop);
      var isNew = score > highScore;
      if (isNew) {
        highScore = score;
        localStorage.setItem('snake_hs', highScore);
        document.getElementById('high-score-val').textContent = highScore;
      }
      document.getElementById('final-score').textContent = 'Score: ' + score;
      document.getElementById('new-best-msg').style.display = isNew ? 'block' : 'none';
      document.getElementById('over-box').style.display = 'block';
      overlay.classList.add('active');
    }

    function draw() {
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots (subtle)
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          ctx.fillRect(c * CELL + CELL / 2 - 1, r * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Food
      var fx = food.x * CELL + CELL / 2;
      var fy = food.y * CELL + CELL / 2;
      var grad = ctx.createRadialGradient(fx, fy, 1, fx, fy, CELL * 0.46);
      grad.addColorStop(0, '#ff6b9d');
      grad.addColorStop(1, '#e11d48');
      ctx.beginPath();
      ctx.arc(fx, fy, CELL * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(fx, fy, CELL * 0.48, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(225,29,72,0.18)';
      ctx.fill();

      // Snake
      for (var i = 0; i < snake.length; i++) {
        var seg = snake[i];
        var t = i / Math.max(snake.length - 1, 1);
        // Gradient from bright green head to darker tail
        var g = Math.round(222 - t * 80);
        var b = Math.round(128 - t * 80);
        ctx.fillStyle = 'rgb(0,' + g + ',' + b + ')';
        var pad = i === 0 ? 1 : 2;
        var size = CELL - pad * 2;
        roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, size, size, i === 0 ? 5 : 3);
        ctx.fill();

        // Head highlight
        if (i === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          roundRect(ctx, seg.x * CELL + pad + 2, seg.y * CELL + pad + 2, size - 4, size / 2 - 2, 3);
          ctx.fill();
          // Eyes
          var eyeSize = 2.5;
          var eyeOffset = 4;
          ctx.fillStyle = '#0a0a0f';
          if (dir.x === 1) {
            ctx.beginPath(); ctx.arc(seg.x * CELL + CELL - 4, seg.y * CELL + 5, eyeSize, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(seg.x * CELL + CELL - 4, seg.y * CELL + CELL - 5, eyeSize, 0, Math.PI * 2); ctx.fill();
          } else if (dir.x === -1) {
            ctx.beginPath(); ctx.arc(seg.x * CELL + 4, seg.y * CELL + 5, eyeSize, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(seg.x * CELL + 4, seg.y * CELL + CELL - 5, eyeSize, 0, Math.PI * 2); ctx.fill();
          } else if (dir.y === -1) {
            ctx.beginPath(); ctx.arc(seg.x * CELL + 5, seg.y * CELL + 4, eyeSize, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(seg.x * CELL + CELL - 5, seg.y * CELL + 4, eyeSize, 0, Math.PI * 2); ctx.fill();
          } else {
            ctx.beginPath(); ctx.arc(seg.x * CELL + 5, seg.y * CELL + CELL - 4, eyeSize, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(seg.x * CELL + CELL - 5, seg.y * CELL + CELL - 4, eyeSize, 0, Math.PI * 2); ctx.fill();
          }
        }
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Controls
    document.addEventListener('keydown', function(e) {
      if (!running) {
        if (e.code === 'Space') startGame();
        return;
      }
      if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && dir.y !== 1)
        nextDir = { x: 0, y: -1 };
      else if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && dir.y !== -1)
        nextDir = { x: 0, y: 1 };
      else if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && dir.x !== 1)
        nextDir = { x: -1, y: 0 };
      else if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && dir.x !== -1)
        nextDir = { x: 1, y: 0 };

      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });

    // Touch swipe support
    var touchStartX, touchStartY;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
      if (!running) return;
      var dx = e.changedTouches[0].clientX - touchStartX;
      var dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20 && dir.x !== -1) nextDir = { x: 1, y: 0 };
        else if (dx < -20 && dir.x !== 1) nextDir = { x: -1, y: 0 };
      } else {
        if (dy > 20 && dir.y !== -1) nextDir = { x: 0, y: 1 };
        else if (dy < -20 && dir.y !== 1) nextDir = { x: 0, y: -1 };
      }
    }, { passive: true });

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);

    // Draw initial state
    initGame();
    draw();
  </script>
</body>
</html>
