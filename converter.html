<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unit Converter – Shahmeer's Game Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 40px 20px 60px;
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    .back-btn {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.3s, color 0.3s;
      margin-bottom: 32px;
    }
    .back-btn:hover {
      background: rgba(255,77,158,0.15);
      border-color: rgba(168,85,247,0.6);
      color: white;
      transform: scale(1.06);
      box-shadow: 0 0 18px rgba(255,77,158,0.3);
    }

    h1 {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(90deg, #ff4d9e, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
    }

    /* Category pills */
    .cats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .cat-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-btn.active {
      background: linear-gradient(135deg, #ff4d9e, #a855f7);
      border-color: transparent;
      color: white;
    }
    .cat-btn:hover:not(.active) {
      border-color: rgba(255,77,158,0.4);
      color: white;
    }

    /* Glass card */
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 28px 24px 24px;
      text-align: left;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }

    /* Number input */
    .num-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: white;
      padding: 14px 18px;
      font-size: 24px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 18px;
      -moz-appearance: textfield;
    }
    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .num-input::placeholder { color: rgba(255,255,255,0.18); font-size: 18px; font-weight: 400; }
    .num-input:focus {
      border-color: rgba(255,77,158,0.5);
      background: rgba(255,255,255,0.09);
    }

    /* From / Swap / To row */
    .units-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 20px;
    }

    .unit-col { flex: 1; min-width: 0; }

    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '▾';
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      font-size: 13px;
    }

    select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: white;
      padding: 12px 32px 12px 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus { border-color: rgba(168,85,247,0.5); }
    select option { background: #141420; color: white; }

    .swap-btn {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      color: rgba(255,255,255,0.55);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1px;
    }
    .swap-btn:hover {
      border-color: rgba(255,77,158,0.5);
      color: white;
      background: rgba(255,77,158,0.1);
    }
    .swap-btn.spin { animation: swapspin 0.3s ease; }
    @keyframes swapspin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(180deg); }
    }

    /* Result box */
    .result-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 22px 20px;
      text-align: center;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.3s;
    }
    .result-box.live { border-color: rgba(168,85,247,0.25); }

    .result-eq {
      font-size: 15px;
      color: rgba(255,255,255,0.22);
      font-style: italic;
    }

    .result-main {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(90deg, #ff4d9e, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .result-unit {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    .result-from {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }

    @media (max-width: 480px) {
      .content { padding: 28px 16px 48px; }
      h1 { font-size: 34px; }
      .glass { padding: 20px 16px 20px; }
      .num-input { font-size: 20px; padding: 12px 16px; }
      .result-main { font-size: 28px; }
      select { font-size: 13px; padding: 11px 28px 11px 12px; }
      .cat-btn { font-size: 12px; padding: 7px 13px; }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="content">
    <a class="back-btn" href="index.html">⬅️ Home</a>
    <h1>Unit Converter</h1>
    <p class="subtitle">Instantly convert between any units</p>

    <div class="cats" id="cats"></div>

    <div class="glass">
      <label class="field-label">Value</label>
      <input class="num-input" id="val" type="number" placeholder="Enter a number…" oninput="calc()">

      <div class="units-row">
        <div class="unit-col">
          <label class="field-label">From</label>
          <div class="sel-wrap">
            <select id="from" onchange="calc()"></select>
          </div>
        </div>

        <button class="swap-btn" id="swap-btn" onclick="swapUnits()" title="Swap units">⇅</button>

        <div class="unit-col">
          <label class="field-label">To</label>
          <div class="sel-wrap">
            <select id="to" onchange="calc()"></select>
          </div>
        </div>
      </div>

      <div class="result-box" id="result-box">
        <div class="result-eq" id="result-eq">Enter a value above</div>
      </div>
    </div>
  </div>

  <script>
    /* ── Stars ── */
    var canvas = document.getElementById('stars');
    var ctx = canvas.getContext('2d');
    var stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    for (var i = 0; i < 140; i++) {
      stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.3,
                   speed: Math.random() * 0.012 + 0.003, phase: Math.random() * Math.PI * 2 });
    }
    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(function(s) {
        var a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    requestAnimationFrame(drawStars);

    /* ── Unit data ── */
    var CATS = {
      length: {
        label: 'Length', icon: '📏',
        def: ['m', 'km'],
        units: [
          { k: 'mm',  n: 'Millimeter',      s: 'mm',   f: 0.001 },
          { k: 'cm',  n: 'Centimeter',       s: 'cm',   f: 0.01 },
          { k: 'm',   n: 'Meter',            s: 'm',    f: 1 },
          { k: 'km',  n: 'Kilometer',        s: 'km',   f: 1000 },
          { k: 'in',  n: 'Inch',             s: 'in',   f: 0.0254 },
          { k: 'ft',  n: 'Foot',             s: 'ft',   f: 0.3048 },
          { k: 'mi',  n: 'Mile',             s: 'mi',   f: 1609.344 }
        ]
      },
      weight: {
        label: 'Weight', icon: '⚖️',
        def: ['kg', 'lb'],
        units: [
          { k: 'mg',  n: 'Milligram',        s: 'mg',   f: 0.001 },
          { k: 'g',   n: 'Gram',             s: 'g',    f: 1 },
          { k: 'kg',  n: 'Kilogram',         s: 'kg',   f: 1000 },
          { k: 'ton', n: 'Metric Ton',       s: 't',    f: 1000000 },
          { k: 'oz',  n: 'Ounce',            s: 'oz',   f: 28.3495 },
          { k: 'lb',  n: 'Pound',            s: 'lb',   f: 453.592 }
        ]
      },
      temperature: {
        label: 'Temperature', icon: '🌡️',
        def: ['C', 'F'],
        units: [
          { k: 'C',   n: 'Celsius',          s: '°C' },
          { k: 'F',   n: 'Fahrenheit',       s: '°F' },
          { k: 'K',   n: 'Kelvin',           s: 'K'  }
        ]
      },
      speed: {
        label: 'Speed', icon: '💨',
        def: ['kmh', 'mph'],
        units: [
          { k: 'kmh', n: 'Km/h',             s: 'km/h', f: 1 / 3.6 },
          { k: 'mph', n: 'Mph',              s: 'mph',  f: 0.44704 },
          { k: 'ms',  n: 'm/s',              s: 'm/s',  f: 1 }
        ]
      },
      area: {
        label: 'Area', icon: '📐',
        def: ['m2', 'ft2'],
        units: [
          { k: 'cm2',  n: 'Sq Centimeter',   s: 'cm²',  f: 0.0001 },
          { k: 'm2',   n: 'Sq Meter',        s: 'm²',   f: 1 },
          { k: 'km2',  n: 'Sq Kilometer',    s: 'km²',  f: 1e6 },
          { k: 'in2',  n: 'Sq Inch',         s: 'in²',  f: 0.00064516 },
          { k: 'ft2',  n: 'Sq Foot',         s: 'ft²',  f: 0.092903 },
          { k: 'acre', n: 'Acre',            s: 'acre', f: 4046.856 }
        ]
      },
      volume: {
        label: 'Volume', icon: '🧪',
        def: ['l', 'cup'],
        units: [
          { k: 'ml',   n: 'Milliliter',      s: 'ml',   f: 1 },
          { k: 'l',    n: 'Liter',           s: 'L',    f: 1000 },
          { k: 'tsp',  n: 'Teaspoon (US)',   s: 'tsp',  f: 4.92892 },
          { k: 'tbsp', n: 'Tablespoon (US)', s: 'tbsp', f: 14.7868 },
          { k: 'cup',  n: 'Cup (US)',        s: 'cup',  f: 236.588 },
          { k: 'pt',   n: 'Pint (US)',       s: 'pt',   f: 473.176 },
          { k: 'gal',  n: 'Gallon (US)',     s: 'gal',  f: 3785.41 }
        ]
      }
    };

    var currentCat = 'length';

    /* ── Build category buttons ── */
    var catsEl = document.getElementById('cats');
    Object.keys(CATS).forEach(function(id) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn' + (id === 'length' ? ' active' : '');
      btn.textContent = CATS[id].icon + ' ' + CATS[id].label;
      btn.onclick = function() { setCategory(id); };
      catsEl.appendChild(btn);
    });

    /* ── Populate dropdowns ── */
    function populateSelects(catId) {
      var units = CATS[catId].units;
      var def   = CATS[catId].def;
      ['from', 'to'].forEach(function(id, i) {
        var sel = document.getElementById(id);
        sel.innerHTML = '';
        units.forEach(function(u) {
          var opt = document.createElement('option');
          opt.value = u.k;
          opt.textContent = u.n + ' (' + u.s + ')';
          if (u.k === def[i]) opt.selected = true;
          sel.appendChild(opt);
        });
      });
    }

    /* ── Switch category ── */
    function setCategory(id) {
      currentCat = id;
      document.querySelectorAll('.cat-btn').forEach(function(btn, i) {
        btn.classList.toggle('active', Object.keys(CATS)[i] === id);
      });
      populateSelects(id);
      calc();
    }

    /* ── Convert ── */
    function convertTemp(val, from, to) {
      var c = from === 'C' ? val : from === 'F' ? (val - 32) * 5 / 9 : val - 273.15;
      return to === 'C' ? c : to === 'F' ? c * 9 / 5 + 32 : c + 273.15;
    }

    function fmt(n) {
      if (!isFinite(n) || isNaN(n)) return '—';
      if (n === 0) return '0';
      var abs = Math.abs(n);
      if (abs > 0 && abs < 1e-8) return n.toExponential(4);
      if (abs >= 1e13)            return n.toExponential(4);
      return parseFloat(n.toPrecision(8)).toString();
    }

    function calc() {
      var raw = document.getElementById('val').value;
      var box = document.getElementById('result-box');
      var eq  = document.getElementById('result-eq');

      if (raw === '' || raw === null) {
        box.classList.remove('live');
        box.innerHTML = '<div class="result-eq">Enter a value above</div>';
        return;
      }

      var val  = parseFloat(raw);
      var from = document.getElementById('from').value;
      var to   = document.getElementById('to').value;
      var cat  = CATS[currentCat];

      var result = currentCat === 'temperature'
        ? convertTemp(val, from, to)
        : val * unitBy(from).f / unitBy(to).f;

      var fromUnit = unitBy(from);
      var toUnit   = unitBy(to);
      var resultStr = fmt(result);

      box.classList.add('live');
      box.innerHTML =
        '<div class="result-main">' + resultStr + '</div>' +
        '<div class="result-unit">' + toUnit.s + '</div>' +
        '<div class="result-from">' + fmt(val) + ' ' + fromUnit.s + ' = ' + resultStr + ' ' + toUnit.s + '</div>';
    }

    function unitBy(key) {
      return CATS[currentCat].units.find(function(u) { return u.k === key; });
    }

    /* ── Swap units ── */
    function swapUnits() {
      var from = document.getElementById('from');
      var to   = document.getElementById('to');
      var tmp  = from.value;
      from.value = to.value;
      to.value   = tmp;

      var btn = document.getElementById('swap-btn');
      btn.classList.remove('spin');
      void btn.offsetWidth;
      btn.classList.add('spin');

      calc();
    }

    /* ── Init ── */
    populateSelects('length');
    calc();
  </script>
</body>
</html>
