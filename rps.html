<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      padding: 40px 20px 60px;
    }
    .back-btn {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
      margin-bottom: 36px;
    }
    .back-btn:hover {
      background: rgba(255,77,158,0.15);
      border-color: rgba(168,85,247,0.6);
      color: white;
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255,77,158,0.35), 0 0 36px rgba(168,85,247,0.15);
    }
    h1 {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(90deg, #ff4d9e, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.4); margin-bottom: 36px; }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    .choices { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .choice-btn {
      font-size: 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      width: 90px; height: 90px;
      cursor: pointer;
      transition: transform 0.15s, border 0.2s, box-shadow 0.2s;
    }
    .choice-btn:hover {
      transform: scale(1.12);
      border: 1px solid rgba(255,77,158,0.5);
      box-shadow: 0 0 20px rgba(255,77,158,0.2);
    }
    .choice-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #result {
      font-size: 22px;
      margin: 16px 0 8px;
      min-height: 30px;
    }
    #score { font-size: 15px; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
    #winner { font-size: 28px; color: gold; min-height: 36px; }
    .action-btn {
      background: linear-gradient(135deg, #ff4d9e, #a855f7);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 11px 28px;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .action-btn:hover { opacity: 0.85; transform: scale(1.04); }

    @media (max-width: 480px) {
      .content { padding: 28px 16px 48px; }
      h1 { font-size: 34px; }
      .subtitle { font-size: 14px; margin-bottom: 24px; }
      .glass { padding: 28px 16px 32px; }
      .choice-btn { width: 82px; height: 82px; font-size: 36px; border-radius: 14px; }
      #result { font-size: 17px; }
      #score { font-size: 13px; }
      #winner { font-size: 22px; }
      .action-btn { font-size: 15px; padding: 12px 28px; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <button id="mute-btn" onclick="toggleMute()" title="Sound" style="position:fixed;top:14px;right:14px;z-index:9999;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;backdrop-filter:blur(10px);transition:transform .15s"></button>
  <div class="content">
    <a class="back-btn" href="index.html">⬅️ Home</a>
    <h1>Rock Paper Scissors</h1>
    <p class="subtitle">First to 2 wins takes the crown! 🏆</p>
    <div class="glass">
      <div class="choices">
        <button class="choice-btn" id="r" onclick="play('rock')">🪨</button>
        <button class="choice-btn" id="p" onclick="play('paper')">📄</button>
        <button class="choice-btn" id="s" onclick="play('scissors')">✂️</button>
      </div>
      <p id="result">Make your move!</p>
      <p id="score">Wins: 0 | Losses: 0 | Ties: 0</p>
      <p id="winner"></p>
    </div>
  </div>

  <script>
    var canvas = document.getElementById("stars");
    var ctx = canvas.getContext("2d");
    var stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    for (var i = 0; i < 160; i++) {
      stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.3, speed: Math.random() * 0.012 + 0.003, phase: Math.random() * Math.PI * 2 });
    }
    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    requestAnimationFrame(drawStars);

    var wins = 0, losses = 0, ties = 0;

    function disableButtons() {
      document.getElementById("r").disabled = true;
      document.getElementById("p").disabled = true;
      document.getElementById("s").disabled = true;
    }
    function enableButtons() {
      document.getElementById("r").disabled = false;
      document.getElementById("p").disabled = false;
      document.getElementById("s").disabled = false;
    }
    function resetGame() {
      wins = 0; losses = 0; ties = 0;
      document.getElementById("score").innerHTML = "Wins: 0 | Losses: 0 | Ties: 0";
      document.getElementById("result").innerHTML = "Make your move!";
      document.getElementById("result").style.color = "white";
      document.getElementById("winner").innerHTML = "";
      enableButtons();
    }
    function play(player) {
      disableButtons();
      document.getElementById("result").innerHTML = "⏳ Processing...";
      setTimeout(function() {
        var choices = ["rock", "paper", "scissors"];
        var computer = choices[Math.floor(Math.random() * 3)];
        var result = document.getElementById("result");
        var winner = document.getElementById("winner");
        if (player === computer) {
          ties++; sndTie();
          result.style.color = "gold";
          result.innerHTML = "🤝 Tie! Computer chose " + computer;
        } else if (
          (player === "rock" && computer === "scissors") ||
          (player === "paper" && computer === "rock") ||
          (player === "scissors" && computer === "paper")
        ) {
          wins++; sndWin();
          result.style.color = "#4ade80";
          result.innerHTML = "🎉 You win! Computer chose " + computer;
        } else {
          losses++;
          result.style.color = "#f87171";
          result.innerHTML = "💀 You lose! Computer chose " + computer;
        }
        document.getElementById("score").innerHTML = "Wins: " + wins + " | Losses: " + losses + " | Ties: " + ties;
        if (wins === 2) {
          setTimeout(function() {
            winner.innerHTML = "🏆 You are the Champion!<br><button class='action-btn' onclick='resetGame()'>Play Again</button>";
          }, 1000);
        } else if (losses === 2) {
          setTimeout(function() {
            winner.innerHTML = "💻 Computer wins!<br><button class='action-btn' onclick='resetGame()'>Play Again</button>";
          }, 1000);
        } else {
          setTimeout(enableButtons, 1000);
        }
      }, 600);
    }

    // ── Audio ──────────────────────────────────────────────────────
    var _ac=null,_muted=localStorage.getItem('sfx')==='1';
    function _ctx(){return _ac||(_ac=new(window.AudioContext||window.webkitAudioContext)())}
    function _sfx(f){if(!_muted)try{f(_ctx())}catch(e){}}
    function toggleMute(){_muted=!_muted;localStorage.setItem('sfx',_muted?'1':'0');document.getElementById('mute-btn').textContent=_muted?'🔇':'🔊'}
    function sndWin(){_sfx(function(c){[523,659,784,1047].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;var t=c.currentTime+i*.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.15,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.28)})})}
    function sndLose(){_sfx(function(c){[330,277,220].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=f;var t=c.currentTime+i*.18;g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35)})})}
    function sndTie(){_sfx(function(c){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=440;g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);o.start();o.stop(c.currentTime+.18)})}
    document.getElementById('mute-btn').textContent=_muted?'🔇':'🔊';
  </script>
</body>
</html>
